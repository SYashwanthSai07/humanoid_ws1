# Improvised Kicking Parameters for Gazebo Simulation
# Uses aggressive walking strategy to actually kick the ball

# Image processing parameters
image_process_size: [160, 120]

# Red ball detection (HSV color space)
lower_red1: [0, 100, 100]
upper_red1: [10, 255, 255]
lower_red2: [160, 100, 100]
upper_red2: [180, 255, 255]

min_ball_area: 50
max_ball_area: 19200

# ROI for ball detection
ball_roi: [0.2, 0.9, 0.1, 0.9]

# Walking parameters
approach_speed: 0.012           # Normal approach speed
turn_speed: 0.008               # Speed when turning
max_turn_angle: 10              # Maximum turn angle

# Kicking parameters - AGGRESSIVE for actual kicking!
kick_speed: 0.035               # Maximum speed for powerful kick
kick_steps: 8                   # Number of rapid kicking steps

# Image topic
image_topic: /camera/image_raw
